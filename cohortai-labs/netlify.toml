[build]
  command = "npm ci --no-audit --no-fund && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"
  NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"
  HUSKY = "0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
